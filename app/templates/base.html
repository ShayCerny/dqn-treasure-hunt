<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DQN Treasure Hunt{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-1 mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">DQN Treasure Hunt</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/mazes' %}active{% endif %}" href="/mazes">Maze Builder</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/train' or request.path.startswith('/train/') %}active{% endif %}" href="/train">Train</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/runs' %}active{% endif %}" href="/runs">Run History</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/help' %}active{% endif %}" href="/help">Help</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <!-- Playback modal (shared across pages) -->
  <div class="modal fade" id="playback-modal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Agent Playback — Run <span id="pb-run-id"></span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center">
          <div class="text-muted small mb-1" id="pb-start-hint">Click any cell to set start</div>
          <div id="pb-maze-grid" class="mb-3" style="display:inline-block;"></div>
          <div class="d-flex justify-content-center align-items-center gap-3">
            <button class="btn btn-sm btn-outline-secondary" id="pb-prev-btn" onclick="pbAdvance(-1)">&#9198; Prev</button>
            <button class="btn btn-sm btn-success" id="pb-play-btn" onclick="pbTogglePlay()">&#9654; Play</button>
            <button class="btn btn-sm btn-outline-secondary" id="pb-next-btn" onclick="pbAdvance(1)">Next &#9197;</button>
            <span class="text-muted small" id="pb-step-label">Step 0 / 0</span>
          </div>
          <div id="pb-outcome" class="mt-2 small fw-semibold"></div>
          <div class="d-flex justify-content-center flex-wrap gap-3 mt-3 small text-muted border-top pt-3">
            <span><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#20c997;vertical-align:middle;margin-right:4px;"></span>Agent</span>
            <span><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#ffc107;vertical-align:middle;margin-right:4px;"></span>Treasure</span>
            <span><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#0d6efd;vertical-align:middle;margin-right:4px;"></span>Start</span>
            <span><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#212529;vertical-align:middle;margin-right:4px;"></span>Wall</span>
            <span>
              <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#cfe2ff;border:1px solid #9ec5fe;vertical-align:middle;margin-right:4px;"></span>BFS Optimal Path
              <span class="ms-1" data-bs-toggle="tooltip" data-bs-placement="top"
                    title="Shortest possible route computed by BFS, shown for comparison">&#9432;</span>
            </span>
            <span><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#ffffff;border:1px solid #dee2e6;vertical-align:middle;margin-right:4px;"></span>Free cell</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="{{ url_for('static', filename='js/api-client.js') }}"></script>
  <script src="{{ url_for('static', filename='js/playback.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
